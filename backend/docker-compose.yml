version: '3.8'

services:
  # Go Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hb-finance-backend
    ports:
      - "8080:8080"
    environment:
      RPC_URL: ${RPC_URL:-https://sepolia.drpc.org}
      RPC_FALLBACK: ${RPC_FALLBACK:-https://sepolia.infura.io}
      SPENDER_ADDRESS: ${SPENDER_ADDRESS:-0x57C3a549e3aFa9c12fE9031F1ADE08A8D8729A28}
      USDC_ADDRESS: ${USDC_ADDRESS:-0x4229D50d940E546DEaa8fc1fEe5b72cCCE3E9DbF}
      USDT_ADDRESS: ${USDT_ADDRESS:-0xd78e26e0017fb6D830395f5247c04CC71DEc3a47}
      PYUSD_ADDRESS: ${PYUSD_ADDRESS:-0x434aA6660FA949A9d57128beCe17DD33E4899b27}
      SERVER_PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
    volumes:
      - ./.env:/root/.env
    networks:
      - hb-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/system/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # PostgreSQL Database (optional, for future use)
  postgres:
    image: postgres:15-alpine
    container_name: hb-finance-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-hb_finance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hb-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hb-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
